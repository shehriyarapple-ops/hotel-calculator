name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build for Android
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev build-essential ccache

      - name: Install Buildozer and Cython
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade buildozer==1.5.0 cython==0.29.36 virtualenv

      - name: Build APK
        run: |
          yes | buildozer android debug
        env:
          ANDROID_ACCEPT_SDK_LICENSE: "1"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: HotelCalculator-apk
          path: bin/*.apk
          if-no-files-found: error
